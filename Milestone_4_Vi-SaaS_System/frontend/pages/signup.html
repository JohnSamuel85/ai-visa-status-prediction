<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Vi-SaaS</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛂</text></svg>" />
</head>
<body>
<div class="auth-page">
  <div class="orb orb-1" style="width:350px;height:350px;top:-10%;right:-10%;opacity:0.4;"></div>
  <div class="orb orb-2" style="width:300px;height:300px;bottom:-10%;left:-5%;opacity:0.3;"></div>
  <div class="grid-lines"></div>

  <div style="position:relative;z-index:1;width:100%;max-width:460px;">
    <div class="auth-logo">
      <a href="#" onclick="goHome(event, '../')" style="display:inline-flex;align-items:center;gap:10px;font-family:var(--font-display);font-size:1.5rem;font-weight:700;">
        <div class="nav-logo-icon">🛂</div>
        Vi-<span class="gradient-text">SaaS</span>
      </a>
    </div>

    <div class="card glass-card" style="padding:40px;">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Start predicting visa outcomes for free</p>

      <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="signupName" class="form-input" placeholder="John Doe" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="signupEmail" class="form-input" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div style="position:relative;">
            <input type="password" id="signupPassword" class="form-input" placeholder="At least 8 characters" required autocomplete="new-password" style="padding-right:48px;" oninput="checkPasswordStrength(this.value)" />
            <button type="button" onclick="togglePwd('signupPassword',this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;color:var(--text-muted);">👁</button>
          </div>
          <!-- Password strength bar -->
          <div style="margin-top:8px;">
            <div style="height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;">
              <div id="strengthBar" style="height:100%;width:0%;border-radius:2px;transition:all 0.3s ease;background:var(--accent-red);"></div>
            </div>
            <p id="strengthLabel" class="body-sm" style="margin-top:4px;font-size:0.75rem;color:var(--text-muted);"></p>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat password" required autocomplete="new-password" />
        </div>

        <div style="display:flex;align-items:flex-start;gap:10px;font-size:0.8125rem;color:var(--text-secondary);">
          <input type="checkbox" id="agreeTerms" required style="margin-top:2px;accent-color:var(--accent-purple);" />
          <label for="agreeTerms">I agree to the <a href="#" class="auth-link">Terms of Service</a> and <a href="#" class="auth-link">Privacy Policy</a></label>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="signupBtn">
          <span id="signupBtnText">Create Free Account</span>
        </button>
      </form>

      <div class="auth-divider" style="margin:20px 0;">or</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
        <button type="button" onclick="quickDemo()" class="btn btn-secondary" style="font-size:0.875rem;">🔗 Google (Demo)</button>
        <button type="button" onclick="quickDemo()" class="btn btn-secondary" style="font-size:0.875rem;">🔗 GitHub (Demo)</button>
      </div>

      <p class="text-center body-sm text-secondary">
        Already have an account? <a href="login.html" class="auth-link">Sign in →</a>
      </p>
    </div>

    <!-- Benefits -->
    <div style="display:flex;justify-content:center;gap:24px;margin-top:20px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:6px;font-size:0.8125rem;color:var(--text-muted);">
        <span style="color:var(--accent-green);">✓</span> No credit card
      </div>
      <div style="display:flex;align-items:center;gap:6px;font-size:0.8125rem;color:var(--text-muted);">
        <span style="color:var(--accent-green);">✓</span> 3 free predictions
      </div>
      <div style="display:flex;align-items:center;gap:6px;font-size:0.8125rem;color:var(--text-muted);">
        <span style="color:var(--accent-green);">✓</span> Cancel anytime
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="../js/app.js"></script>
<script>
function handleSignup(e) {
  e.preventDefault();
  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const confirm = document.getElementById('confirmPassword').value;

  if (password !== confirm) { showToast('Passwords do not match', 'error'); return; }
  if (password.length < 6) { showToast('Password too short', 'error'); return; }

  const btn = document.getElementById('signupBtn');
  const btnText = document.getElementById('signupBtnText');
  btnText.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div>';
  btn.disabled = true;

  fetch('http://127.0.0.1:5000/api/auth/signup', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name, email, password})
  })
  .then(r => r.json().then(data => ({status: r.status, data})))
  .then(({status, data}) => {
    if (status === 200 && data.access_token) {
      localStorage.removeItem('visaas_history');
      localStorage.removeItem('visaas_lastresult');
      localStorage.setItem('visaas_token', data.access_token);
      localStorage.setItem('visaas_user', JSON.stringify(data.user));
      showToast('Account created! Welcome to Vi-SaaS 🎉', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
    } else {
      showToast(data.detail || 'Signup failed', 'error');
      btnText.textContent = 'Create Free Account';
      btn.disabled = false;
    }
  })
  .catch((err) => {
    console.error('Signup error:', err);
    showToast('Connection error. Please ensure the backend is running.', 'error');
    btnText.textContent = 'Create Free Account';
    btn.disabled = false;
  });
}

function quickDemo() {
  localStorage.removeItem('visaas_history');
  localStorage.removeItem('visaas_lastresult');
  localStorage.setItem('visaas_token', 'demo_token_' + Date.now());
  localStorage.setItem('visaas_user', JSON.stringify({name:'Demo User', email:'demo@vi-saas.com'}));
  showToast('Starting demo experience... ✨', 'success');
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
}

function togglePwd(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'text' ? '🙈' : '👁';
}

function checkPasswordStrength(val) {
  const bar = document.getElementById('strengthBar');
  const label = document.getElementById('strengthLabel');
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    {pct:'20%', color:'#ef4444', text:'Too weak'},
    {pct:'40%', color:'#f97316', text:'Weak'},
    {pct:'60%', color:'#eab308', text:'Fair'},
    {pct:'80%', color:'#22c55e', text:'Good'},
    {pct:'100%', color:'#10b981', text:'Strong ✓'},
  ];
  const lvl = levels[Math.min(score, 4)];
  if (val.length > 0) {
    bar.style.width = lvl.pct;
    bar.style.background = lvl.color;
    label.textContent = lvl.text;
    label.style.color = lvl.color;
  } else {
    bar.style.width = '0%';
    label.textContent = '';
  }
}
</script>
</body>
</html>
