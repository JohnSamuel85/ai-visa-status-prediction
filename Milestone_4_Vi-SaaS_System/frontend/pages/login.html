<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Vi-SaaS</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛂</text></svg>" />
</head>
<body>
<div class="auth-page">
  <div class="orb orb-1" style="width:350px;height:350px;top:-10%;left:-10%;opacity:0.4;"></div>
  <div class="orb orb-2" style="width:300px;height:300px;bottom:-10%;right:-5%;opacity:0.3;"></div>
  <div class="grid-lines"></div>

  <div style="position:relative;z-index:1;width:100%;max-width:440px;">
    <div class="auth-logo">
      <a href="#" onclick="goHome(event, '../')" style="display:inline-flex;align-items:center;gap:10px;font-family:var(--font-display);font-size:1.5rem;font-weight:700;">
        <div class="nav-logo-icon">🛂</div>
        Vi-<span class="gradient-text">SaaS</span>
      </a>
    </div>

    <div class="card glass-card" style="padding:40px;">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your Vi-SaaS account</p>

      <!-- Demo hint -->
      <div style="background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:10px;padding:12px 16px;margin-bottom:24px;font-size:0.8125rem;color:#a78bfa;display:flex;gap:8px;align-items:center;">
        <span>💡</span>
        <span>Demo: use any email + password (min 6 chars) to sign in</span>
      </div>

      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" style="display:flex;justify-content:space-between;">
            <span>Password</span>
            <a href="#" class="auth-link" style="font-weight:500;">Forgot password?</a>
          </label>
          <div style="position:relative;">
            <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password" style="padding-right:48px;" />
            <button type="button" onclick="togglePwd('loginPassword',this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;color:var(--text-muted);">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
        </button>
      </form>

      <div class="auth-divider" style="margin:24px 0;">or continue with</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;">
        <button type="button" onclick="demoLogin()" class="btn btn-secondary" style="font-size:0.875rem;">🔗 Google (Demo)</button>
        <button type="button" onclick="demoLogin()" class="btn btn-secondary" style="font-size:0.875rem;">🔗 GitHub (Demo)</button>
      </div>

      <p class="text-center body-sm text-secondary">
        Don't have an account? <a href="signup.html" class="auth-link">Create one free →</a>
      </p>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="../js/app.js"></script>
<script>
function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  const btnText = document.getElementById('loginBtnText');
  
  btnText.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div>';
  btn.disabled = true;

  fetch('http://127.0.0.1:5000/api/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email, password})
  })
  .then(r => r.json().then(data => ({status: r.status, data})))
  .then(({status, data}) => {
    if (status === 200 && data.access_token) {
      localStorage.removeItem('visaas_history');
      localStorage.removeItem('visaas_lastresult');
      localStorage.setItem('visaas_token', data.access_token);
      localStorage.setItem('visaas_user', JSON.stringify(data.user));
      showToast('Welcome back! ✨', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
    } else {
      showToast(data.detail || 'Login failed', 'error');
      btnText.textContent = 'Sign In';
      btn.disabled = false;
    }
  })
  .catch((err) => {
    console.error('Login error:', err);
    showToast('Connection error. Please ensure the backend is running.', 'error');
    btnText.textContent = 'Sign In';
    btn.disabled = false;
  });
}

function demoLogin() {
  localStorage.removeItem('visaas_history');
  localStorage.removeItem('visaas_lastresult');
  localStorage.setItem('visaas_token', 'demo_token_' + Date.now());
  localStorage.setItem('visaas_user', JSON.stringify({name:'Demo User', email:'demo@vi-saas.com'}));
  showToast('Welcome to Demo Mode ✨', 'success');
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
}

function togglePwd(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁'; }
}
</script>
</body>
</html>
